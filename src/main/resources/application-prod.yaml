app:
  file-security:
    storage-root: /opt/app/files
    max-upload-size-bytes: 10485760

    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - application/pdf

    allowed-origins:
      - "https://app-a.example.com"
      - "https://admin-a.example.com"
      - "https://app-b.example.com"
      - "https://fidelity25.it"

    caller-policies:
      - caller: "fidelity25.it"
        roots:
          - "twentyfive-fidelity"

      - caller: "admin.fidelity25.it"
        roots:
          - "twentyfive-fidelity"
logging:
  level:
    root: INFO
    com.example.twentyfivemediamanager: DEBUG
    org.springframework.security: INFO