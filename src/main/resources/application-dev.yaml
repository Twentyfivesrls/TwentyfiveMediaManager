app:
  file-security:
    storage-root: /opt/app/files
    max-upload-size-bytes: 10485760

    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
      - application/pdf

    allowed-origins:
      - "https://app-a.example.com"
      - "https://admin-a.example.com"
      - "https://app-b.example.com"
      - "http://localhost:4200"
      - "http://localhost:5173"
      - "http://127.0.0.1:4200"

    root-policies:
      - root: "A"
        origins:
          - "https://app-a.example.com"
          - "https://admin-a.example.com"
          - "http://localhost:4200"
          - "http://localhost:5173"

      - root: "B"
        origins:
          - "https://app-b.example.com"
          - "http://127.0.0.1:4200"